<!DOCTYPE html>
<html>
<head>

<title>MailForge Campaigns</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<link rel="icon" type="image/png" href="assets/favicon.png">

<body class="bg-gray-900 text-white">

<div class="max-w-3xl mx-auto mt-20">

<h1 class="text-3xl font-bold mb-6">
MailForge Campaigns
</h1>

<table class="w-full bg-gray-800 rounded">

<thead>
<tr class="border-b border-gray-700">
<th class="p-3 text-left">ID</th>
<th class="p-3 text-left">Name</th>
<th class="p-3 text-left">Status</th>
<th class="p-3 text-left">Total Emails</th>
<th class="p-3">Open</th>
</tr>
</thead>

<tbody id="campaignTable"></tbody>

</table>

</div>


<script>

async function loadCampaigns(){

const response = await fetch("http://127.0.0.1:8000/campaigns");

const campaigns = await response.json();

let table = document.getElementById("campaignTable");

table.innerHTML = `
<tr>
<td colspan="5" class="text-center p-6 text-gray-400">
Loading campaigns...
</td>
</tr>
`

campaigns.forEach(c => {

table.innerHTML += `
<tr class="border-b border-gray-700">
<td class="p-3">${c.id}</td>
<td class="p-3">${c.name}</td>
<td class="p-3">${c.status}</td>
<td class="p-3">${c.total_emails}</td>
<td class="p-3">
<button onclick="openCampaign(${c.id})"
class="bg-blue-600 hover:bg-blue-700 hover:scale-105 transition px-4 py-2 rounded">
Open
</button>
</td>
</tr>
`;

});

}

function openCampaign(id){

window.location.href = "dashboard.html?campaign=" + id;

}

loadCampaigns();

</script>

</body>
</html>
